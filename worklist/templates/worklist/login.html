{% extends 'base.html'%}
{% block content%}
{% load crispy_forms_tags %}

<div class="auth-section">
</div>
<div class="container my-3  px-5 mx-auto">
    <div class="row">
        <div class="col-sm-8 col-md-6">
            <div class="form-group mt-3 gap-3">
                <form method="POST">
                    {% csrf_token %}
                    {{form|crispy}}
                    <div class="div" style="margin-top: 10px;">
                        <input type="submit" class="btn btn-primary group-sm" value="login">
                        <p>Lost Password?</p>
                        <a  href="#">Password Reset</a>
                    </div>                        
                </form>
            </div>
        </div>
        <div class="col-md-6 mt-0">
            <div class="col-sm-12 col-md-4">
            </div>
        </div>
    </div>
</div>



</div>
    


{%endblock %}
