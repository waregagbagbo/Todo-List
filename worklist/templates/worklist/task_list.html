{%extends 'base.html'%}

{% block content %}
<div class="container my-4">
  <div class="row">
    <!--search section bar-->
    <div class="col-xs-6 col-md-8">
      <form class="d-flex" method="GET">
        <input type="text" class="form-control me-2" placeholder="search for tasks" name="search_input" value="{{search_input}}">
        <button class="btn btn-outline-success" type="submit">Search</button> 
      </form>
      <div>
      </div> 
      <h6 style="margin-top:3px;padding:10px;font-weight:bold;">You have {{count}} incomplete task{{count |pluralize:'s'}}</h6>
    </div>
    <!----task add section-->
    <div class="col-sm-6 col-md-4 mx 4">
      <a href="{%url 'task-add' %}" class="btn btn-outline-primary ">Add New Task</a>
    </div>

  </div>
</div>
<!--container for task list-->
<div class="container" style="background-color:#fff;">
  <div class="row">
    <div class="col-md-6">
      <table class="table">
        <thead>
          <tr>
            <th scope="col">#Worklist</th>
          </tr>
        </thead>
        <tbody>
          {% for task in tasks %}
          <tr>
          </tr>          
           <tr>
            <td>
              {{task.title}}
              <div class="links mx-5">
                <a href="{% url 'task' task.id %}" class="btn btn-primary btn-primary">View</a>
                <a href="{% url 'task_update' task.id %}" class="btn btn-success btn-success">Edit</a>
                <a href="{% url 'task_delete' task.id %}" class="btn btn-danger btn-danger">Delete</a>
              </div>              
            </td>
            {% empty %}
            <h4>Nothing to show</h4>
           </tr>           
          {%endfor%}
        </tbody>
      </table>    
    </div>
  </div>
  <div class="col-md-6">
    {{current_time}}
  </div>
