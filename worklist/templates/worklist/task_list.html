{%extends 'base.html'%}

{%block content%}
<h1>My Tasks</h1>
<a href="{% url 'task-add' %}">Add Task</a>

<form method="GET">
  <input type="text"  name="search-area" value="{{searh_input}}">
  <input type="submit" value="search">

</form>

<table>
  <tr>
  </tr> 
  {% for task in tasks %}
  <tr>
      <td>{{task.title }}
        <a href="{% url 'task' task.id %}">View</a>
        <a href="{% url 'task_update' task.id %}">Edit</a>
        <a href="{% url 'task_delete' task.id %}">Delete</a>
      </td>

  </tr> 
  {% empty %}
  {% endfor %}
    
</table>





{% endblock %}
